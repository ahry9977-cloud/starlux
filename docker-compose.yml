version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: starlux-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: starlux
      MYSQL_USER: starlux
      MYSQL_PASSWORD: starlux_pass
    ports:
      - "3306:3306"
    command: ["--default-authentication-plugin=mysql_native_password"]
    volumes:
      - starlux_mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

volumes:
  starlux_mysql_data:
