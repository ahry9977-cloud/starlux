version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: starlux-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: starlux
      POSTGRES_USER: starlux
      POSTGRES_PASSWORD: starlux_pass
    ports:
      - "5432:5432"
    volumes:
      - starlux_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

volumes:
  starlux_pg_data:
