
[phases.setup]
# Ensure native modules like better-sqlite3 can build if needed
nixPkgs = ["nodejs_20", "python3", "gcc", "gnumake", "pkg-config"]

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["rm -rf node_modules/.vite || true", "npm run build:prod"]

[start]
cmd = "npm run start"
